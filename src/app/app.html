<app-navbar-fipaz (onQuieroExponerClick)="abrirModalExpositores()"
  (onQuieroVisitarClick)="abrirModalVisitantes()"></app-navbar-fipaz>
<app-hero-fipaz (onQuieroExponerClick)="abrirModalExpositores()"></app-hero-fipaz>
<!-- CONTENEDOR MAESTRO DE LA FERIA -->
<main style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
  <!-- Encabezado Temporal del Tablero -->
  <header style="margin-bottom: 40px; border-bottom: 2px solid var(--border); padding-bottom: 20px;">
    <h1 style="color: var(--text-strong); font-size: 28px; font-weight: 900;">
      <span style="color: var(--primary);">FIPAZ 2026</span> - 25 Años de historia
    </h1>
  </header>
  <!-- BLOQUE 1: PANEL DE MÉTRICAS (MÓDULOS GERENCIALES)  <app-dashboard-metricas></app-dashboard-metricas>
  -->
  <!-- CONTADOR (Nuevo Bloque Integrado) -->
  <app-seccion-institucional></app-seccion-institucional>
  <app-contador-fipaz></app-contador-fipaz>

  <!-- BLOQUE 2: PROGRAMA OFICIAL (AGENDA INTERACTIVA)   -->
  <app-tablero-eventos></app-tablero-eventos>
  <!-- GALERIA HISTORICA  -->
  <app-galeria-historica></app-galeria-historica>

  <!-- Aquí iremos inyectando los siguientes bloques a medida que los migremos -->
  <app-patrocinadores-premiun></app-patrocinadores-premiun>
</main>
<!--  FOOTER -->
<app-footer-fipaz (onExponerClick)="abrirModalExpositores()"
  (onVisitanteClick)="abrirModalVisitantes()"></app-footer-fipaz>
<!-- MODALES -->
<app-expositores-wizard [isOpen]="modalExpositoresAbierto"
  (closeModal)="cerrarModalExpositores()"></app-expositores-wizard>
<!-- BLOQUE 0: GUÍA INFORMATIVA PARA EL VISITANTE (AÑADIDO) -->
<app-visitantes-fipaz [isOpen]="modalVisitantesAbierto" (closeModal)="cerrarModalVisitantes()"></app-visitantes-fipaz>
